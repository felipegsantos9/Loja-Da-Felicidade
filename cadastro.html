<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="cadastro.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap"
    rel="stylesheet">
    <title>Loja da Felicidade - Cadastro</title>
</head>
<body>
    <div class="tela">
        <img src="Imagens/LogoLoja.png" alt="Logo">
        <h1>Cadastre-Se</h1>
        <form action="./paginaInicial.html">
            <div class="Nome">
                <label for="Nome">
                    <input type="text" placeholder="Digite o Nome de Usuario    ">
                </label>
            </div>

            <div class="Email">
                <label for="Email">
                    <input type="email" placeholder="Digite Seu Email">
                </label>
            </div>

            <div class="Telefome">
                <label for="Telefome">
                    <input type="text"placeholder = "Digite seu telefone">
                </label>
            </div>

            <div class="Senha">
                <label for="Senha">    
                    <input type="password" placeholder="Digite a senha" >
                </label>
            </div>

            <div class="Senha">
                <label for="Senha">
                    <input type="password" placeholder="Confime sua Senha" />
                </label>
            </div>

            <div class="Confirme">
                
                <p 
                style="color: white;" > <input class="checkbox" type="checkbox" > 
                 Li e Concordo com os 
                <a style="color: black;" href="termos">Termos & Condições</a> 
                </p>
            </div>
            <input class="submit" type="submit" value="Cadastre-Se">

    </div>
</body>
</html>
