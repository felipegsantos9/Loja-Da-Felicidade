<!DOCTYPE html>
<html lang="pt-br">

<head>
        <link rel="stylesheet" href="login.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Loja da Felicidade - Login</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
</head>

<body>
        <div class="tela">
                <h1>Loja da Felicidade</h1>
                <img class="Logo" src="Imagens/LogoLoja.png" alt="Logo" width="312" height="312">
                <form action="paginaInicial.html">
                        <div class="Login">
                                <label for="Login">
                                        <p>Login</p>
                                        <input type="email" name="Login" id="Login">
                                </label>
                        </div>

                        <div class="Senha">
                                <label for="Senha">
                                        <p>Senha</p>
                                        <input type="password" name="Senha" id="Senha" width="338">
                                        <a href="#">Esqueci a senha</a>
                                </label>
                        </div>

                        <input class="botao" type="submit" value="Login">

                </form>

                <p>Não tem uma conta?</p>

                <a href="./cadastro.html">
                        <button class="botaocadastro">
                                Cadastre-Se
                        </button>
                </a>

                <button class="botaosocial">
                        Login com Google
                        <img src="Imagens/Google.png" alt="Google ">
                </button>

                <button class="botaosocial1">
                        Login com Facebook
                        <img src="Imagens/Facebook.png" alt="Facebook">
                </button>

        </div>
</body>

</html>
